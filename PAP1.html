<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEET 2026 — Plant Growth & Body Fluids</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0e17;
        --surface: #111827;
        --surface2: #1a2236;
        --surface3: #222d44;
        --border: #2a3654;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
        --accent: #06d6a0;
        --accent2: #118ab2;
        --red: #ef4444;
        --green: #22c55e;
        --amber: #f59e0b;
        --purple: #a78bfa;
        --pink: #f472b6;
        --radius: 12px;
        --radius-sm: 8px;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "IBM Plex Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            ellipse at 20% 0%,
            rgba(6, 214, 160, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 100%,
            rgba(17, 138, 178, 0.06) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        z-index: 1;
      }

      /* HERO */
      .hero {
        text-align: center;
        padding: 60px 20px 50px;
        position: relative;
        z-index: 1;
      }
      .hero-badge {
        display: inline-block;
        padding: 6px 18px;
        border-radius: 50px;
        background: rgba(6, 214, 160, 0.12);
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 18px;
        border: 1px solid rgba(6, 214, 160, 0.2);
      }
      .hero h1 {
        font-family: "DM Serif Display", serif;
        font-size: clamp(28px, 5vw, 44px);
        color: #fff;
        margin-bottom: 12px;
        line-height: 1.2;
      }
      .hero h1 span {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero p {
        color: var(--text2);
        font-size: 16px;
        max-width: 560px;
        margin: 0 auto 28px;
      }
      .hero-tags {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }
      .hero-tag {
        padding: 6px 16px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 600;
      }
      .hero-tag.plant {
        background: rgba(6, 214, 160, 0.12);
        color: var(--accent);
        border: 1px solid rgba(6, 214, 160, 0.2);
      }
      .hero-tag.blood {
        background: rgba(244, 114, 182, 0.12);
        color: var(--pink);
        border: 1px solid rgba(244, 114, 182, 0.2);
      }
      .begin-btn {
        padding: 16px 48px;
        font-size: 17px;
        font-weight: 700;
        color: var(--bg);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 25px rgba(6, 214, 160, 0.3);
      }
      .begin-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 35px rgba(6, 214, 160, 0.4);
      }

      /* PROGRESS BAR */
      .progress-wrap {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10, 14, 23, 0.92);
        backdrop-filter: blur(12px);
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: none;
        transition: box-shadow 0.3s;
      }
      .progress-wrap.scrolled {
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      }
      .progress-inner {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .progress-text {
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
        white-space: nowrap;
        min-width: 90px;
      }
      .progress-text b {
        color: var(--accent);
      }
      .progress-bar {
        flex: 1;
        height: 6px;
        background: var(--surface3);
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 10px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        width: 0%;
      }
      .progress-timer {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--text3);
        min-width: 60px;
        text-align: right;
      }

      /* QUESTION CARD */
      .q-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        margin-bottom: 24px;
        position: relative;
        animation: fadeUp 0.35s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .q-header {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 18px;
      }
      .q-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--bg);
        background: var(--accent);
        padding: 4px 10px;
        border-radius: 6px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .q-num.blood {
        background: var(--pink);
      }
      .q-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .q-tag {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 50px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .q-tag.plant {
        background: rgba(6, 214, 160, 0.12);
        color: var(--accent);
      }
      .q-tag.blood {
        background: rgba(244, 114, 182, 0.12);
        color: var(--pink);
      }
      .q-tag.type {
        background: rgba(167, 139, 250, 0.12);
        color: var(--purple);
      }
      .q-text {
        font-size: 15.5px;
        color: #fff;
        line-height: 1.7;
        margin-bottom: 20px;
      }
      .q-text b,
      .q-text em {
        color: var(--accent);
        font-style: normal;
        font-weight: 600;
      }

      /* OPTIONS */
      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .opt-btn {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 18px;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        width: 100%;
        font-size: 14.5px;
        color: var(--text);
        line-height: 1.5;
        font-family: inherit;
      }
      .opt-btn:hover:not(.disabled) {
        border-color: var(--accent);
        background: rgba(6, 214, 160, 0.05);
      }
      .opt-btn .opt-letter {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        color: var(--text3);
        font-size: 13px;
        min-width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: var(--surface3);
        flex-shrink: 0;
        margin-top: 1px;
      }
      .opt-btn.selected {
        border-color: var(--accent);
        background: rgba(6, 214, 160, 0.08);
      }
      .opt-btn.selected .opt-letter {
        background: var(--accent);
        color: var(--bg);
      }
      .opt-btn.correct-answer {
        border-color: var(--green) !important;
        background: rgba(34, 197, 94, 0.08) !important;
      }
      .opt-btn.correct-answer .opt-letter {
        background: var(--green) !important;
        color: #fff !important;
      }
      .opt-btn.wrong-answer {
        border-color: var(--red) !important;
        background: rgba(239, 68, 68, 0.08) !important;
      }
      .opt-btn.wrong-answer .opt-letter {
        background: var(--red) !important;
        color: #fff !important;
      }
      .opt-btn.disabled {
        cursor: default;
        opacity: 0.85;
      }

      /* NAV BUTTONS */
      .q-nav {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        align-items: center;
      }
      .nav-btn {
        padding: 12px 28px;
        font-size: 14px;
        font-weight: 600;
        border-radius: var(--radius-sm);
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .nav-btn.prev {
        background: var(--surface3);
        color: var(--text);
      }
      .nav-btn.prev:hover:not(:disabled) {
        background: var(--border);
      }
      .nav-btn.next {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: var(--bg);
        margin-left: auto;
      }
      .nav-btn.next:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(6, 214, 160, 0.3);
      }
      .nav-btn.review-mark {
        background: transparent;
        border: 1.5px solid var(--amber);
        color: var(--amber);
        font-size: 13px;
        padding: 10px 16px;
      }
      .nav-btn.review-mark.marked {
        background: rgba(245, 158, 11, 0.15);
      }
      .nav-btn.review-mark:hover {
        background: rgba(245, 158, 11, 0.1);
      }

      /* QUESTION PALETTE */
      .palette-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: var(--bg);
        border: none;
        cursor: pointer;
        font-size: 20px;
        font-weight: 700;
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(6, 214, 160, 0.35);
        transition: all 0.2s;
      }
      .palette-toggle:hover {
        transform: scale(1.08);
      }
      .palette-panel {
        position: fixed;
        bottom: 86px;
        right: 24px;
        width: 280px;
        max-height: 420px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        z-index: 200;
        display: none;
        overflow-y: auto;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }
      .palette-panel h3 {
        font-family: "DM Serif Display", serif;
        font-size: 16px;
        color: #fff;
        margin-bottom: 14px;
      }
      .palette-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .palette-dot {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        cursor: pointer;
        transition: all 0.15s;
        background: var(--surface2);
        color: var(--text3);
        border: 1.5px solid transparent;
      }
      .palette-dot:hover {
        border-color: var(--accent);
      }
      .palette-dot.answered {
        background: var(--accent);
        color: var(--bg);
      }
      .palette-dot.review {
        background: rgba(245, 158, 11, 0.2);
        color: var(--amber);
        border-color: var(--amber);
      }
      .palette-dot.current {
        border-color: #fff;
        color: #fff;
      }
      .palette-legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .palette-legend span {
        font-size: 11px;
        color: var(--text3);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .palette-legend .dot-sample {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      /* RESULTS */
      .results-section {
        display: none;
        padding: 40px 20px;
        position: relative;
        z-index: 1;
      }
      .results-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px 30px;
        max-width: 500px;
        margin: 0 auto 40px;
        text-align: center;
      }
      .results-card h2 {
        font-family: "DM Serif Display", serif;
        font-size: 32px;
        color: #fff;
        margin-bottom: 8px;
      }
      .score-ring {
        width: 160px;
        height: 160px;
        margin: 24px auto;
        position: relative;
      }
      .score-ring svg {
        transform: rotate(-90deg);
      }
      .score-ring .ring-bg {
        fill: none;
        stroke: var(--surface3);
        stroke-width: 10;
      }
      .score-ring .ring-fill {
        fill: none;
        stroke-width: 10;
        stroke-linecap: round;
        transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .score-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .score-center .pct {
        font-family: "JetBrains Mono", monospace;
        font-size: 36px;
        font-weight: 700;
        color: #fff;
      }
      .score-center .of {
        font-size: 13px;
        color: var(--text3);
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 24px;
      }
      .stat-item {
        padding: 14px 8px;
        background: var(--surface2);
        border-radius: var(--radius-sm);
        text-align: center;
      }
      .stat-item .stat-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
      }
      .stat-item .stat-lbl {
        font-size: 10px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
      }
      .stat-item.neet .stat-num {
        color: var(--accent);
      }
      .stat-item.correct .stat-num {
        color: var(--green);
      }
      .stat-item.wrong .stat-num {
        color: var(--red);
      }
      .stat-item.skip .stat-num {
        color: var(--amber);
      }

      /* CHAPTER BREAKDOWN */
      .chapter-breakdown {
        max-width: 500px;
        margin: 0 auto 40px;
      }
      .chapter-breakdown h3 {
        font-family: "DM Serif Display", serif;
        font-size: 20px;
        color: #fff;
        margin-bottom: 16px;
        text-align: center;
      }
      .chapter-bar-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        margin-bottom: 12px;
      }
      .chapter-bar-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
      }
      .chapter-bar-track {
        height: 8px;
        background: var(--surface3);
        border-radius: 10px;
        overflow: hidden;
      }
      .chapter-bar-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 1s ease;
      }

      /* REVIEW SECTION */
      .review-section {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 20px 60px;
      }
      .review-title {
        font-family: "DM Serif Display", serif;
        font-size: 28px;
        color: #fff;
        margin-bottom: 20px;
        text-align: center;
      }
      .review-filter {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 8px 20px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }
      .review-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 16px;
      }
      .review-card .rc-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .review-card .rc-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 50px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .rc-badge.rc-correct {
        background: rgba(34, 197, 94, 0.12);
        color: var(--green);
      }
      .rc-badge.rc-wrong {
        background: rgba(239, 68, 68, 0.12);
        color: var(--red);
      }
      .rc-badge.rc-skipped {
        background: rgba(245, 158, 11, 0.12);
        color: var(--amber);
      }
      .review-card .rc-q {
        font-size: 14.5px;
        color: #fff;
        line-height: 1.6;
        margin-bottom: 14px;
      }
      .review-card .rc-q b,
      .review-card .rc-q em {
        color: var(--accent);
        font-style: normal;
      }
      .review-card .rc-opts {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }
      .review-card .rc-opt {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        font-size: 13.5px;
        color: var(--text2);
        background: var(--surface2);
        border: 1px solid transparent;
      }
      .rc-opt .rc-letter {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 12px;
        min-width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        background: var(--surface3);
        color: var(--text3);
        flex-shrink: 0;
      }
      .rc-opt.rc-opt-correct {
        border-color: var(--green);
        background: rgba(34, 197, 94, 0.06);
        color: var(--green);
      }
      .rc-opt.rc-opt-correct .rc-letter {
        background: var(--green);
        color: #fff;
      }
      .rc-opt.rc-opt-wrong {
        border-color: var(--red);
        background: rgba(239, 68, 68, 0.06);
        color: var(--red);
      }
      .rc-opt.rc-opt-wrong .rc-letter {
        background: var(--red);
        color: #fff;
      }
      .review-card .rc-exp {
        margin-top: 12px;
        padding: 14px 16px;
        background: rgba(6, 214, 160, 0.05);
        border: 1px solid rgba(6, 214, 160, 0.15);
        border-radius: var(--radius-sm);
        font-size: 13.5px;
        color: var(--text2);
        line-height: 1.65;
      }
      .rc-exp strong {
        color: var(--text);
      }
      .rc-exp i {
        color: var(--accent);
        font-style: normal;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 600px) {
        .container {
          padding: 12px;
        }
        .q-card {
          padding: 20px 16px;
        }
        .hero h1 {
          font-size: 26px;
        }
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .progress-inner {
          gap: 10px;
        }
        .palette-panel {
          width: calc(100vw - 48px);
          right: 24px;
        }
        .q-nav {
          flex-wrap: wrap;
        }
        .review-card {
          padding: 18px 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- HERO -->
    <div class="hero" id="hero">
      <div class="hero-badge">NEET 2026 · NCERT Aligned</div>
      <h1>Plant Growth & <span>Body Fluids</span></h1>
      <p>
        50 carefully crafted questions covering Plant Growth & Development and
        Body Fluids & Circulation. Test your NCERT mastery.
      </p>
      <div class="hero-tags">
        <span class="hero-tag plant">🌱 Plant Growth · Q1–25</span>
        <span class="hero-tag blood">🩸 Body Fluids · Q26–50</span>
      </div>
      <button class="begin-btn" onclick="beginTest()">Begin Test →</button>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-inner">
        <div class="progress-text">
          <b id="qCounter">1</b> / 50
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-timer" id="timerDisplay">00:00</div>
      </div>
    </div>

    <!-- QUESTION AREA -->

      const TOTAL = DATA.length;

      function getChapter(i) {
        return i < 25 ? "plant" : "blood";
      }
      function getChapterLabel(i) {
        return i < 25
          ? "🌱 Plant Growth"
          : "🩸 Body Fluids";

      function beginTest() {
        quizStarted = true;
        document.getElementById("hero").style.display = "none";

        document.getElementById("paletteToggle").style.display = "flex";
        startTimer();
        renderQuestion();

      function startTimer() {
        timerInterval = setInterval(() => {
          timerSec++;
          const m = String(Math.floor(timerSec / 60)).padStart(2, "0");
          const s = String(timerSec % 60).padStart(2, "0");
          document.getElementById("timerDisplay").textContent = `${m}:${s}`;
        }, 1000);
      }

      function renderQuestion() {
        const d = DATA[current];
        const ch = getChapter(current);
        const chLabel = getChapterLabel(current);
        const numClass = ch === "blood" ? "blood" : "";
        const tagClass = ch;
        const isLast = current === TOTAL - 1;

        let html = `<div class="q-card">`;
        html += `<div class="q-meta">`;
        html += `<span class="q-tag ${tagClass}">${chLabel}</span>`;
        html += `<span class="q-tag type">MCQ</span>`;
        html += `</div>`;
        html += `<div class="q-header">`;
        html += `<span class="q-num ${numClass}">Q${current + 1}</span>`;
        html += `<div class="q-text">${d.q}</div>`;
        html += `</div>`;
        html += `<div class="options">`;
        d.opts.forEach((o, j) => {
          const sel = userAnswers[current] === j ? " selected" : "";
          html += `<button class="opt-btn${sel}" onclick="selectOpt(${j})">`;
          html += `<span class="opt-letter">${LETTERS[j]}</span>`;
          html += `<span>${o}</span>`;
          html += `</button>`;
        });
        html += `</div>`;

        html += `<div class="q-nav">`;
        html += `<button class="nav-btn prev" onclick="navigate(-1)" ${current === 0 ? "disabled" : ""}>← Prev</button>`;
        html += `<button class="nav-btn review-mark${reviewFlags[current] ? " marked" : ""}" onclick="toggleReview()">`;
        html += reviewFlags[current] ? "★ Marked" : "☆ Mark for Review";
        html += `</button>`;
        if (isLast) {
          html += `<button class="nav-btn next" onclick="finishQuiz()">Finish →</button>`;
        } else {
          html += `<button class="nav-btn next" onclick="navigate(1)">Next →</button>`;
        }
        html += `</div>`;
        html += `</div>`;

        document.getElementById("quizArea").innerHTML = html;

        document.getElementById("qCounter").textContent = current + 1;
        const answered = userAnswers.filter((a) => a !== -1).length;
        document.getElementById("progressFill").style.width =
          (answered / TOTAL) * 100 + "%";

        renderPalette();
      }

      function selectOpt(j) {
        if (submitted) return;
        userAnswers[current] = j;
        renderQuestion();
      }

      function navigate(dir) {
        current = Math.max(0, Math.min(TOTAL - 1, current + dir));
        renderQuestion();
      }

      function jumpTo(i) {
        current = i;
        renderQuestion();
        if (paletteOpen && window.innerWidth < 600) togglePalette();
      }

      function toggleReview() {
        reviewFlags[current] = !reviewFlags[current];
        renderQuestion();
      }

      function togglePalette() {
        paletteOpen = !paletteOpen;
        document.getElementById("palettePanel").style.display = paletteOpen
          ? "block"
          : "none";
      }

      function renderPalette() {
        let html = "";
        for (let i = 0; i < TOTAL; i++) {
          let cls = "palette-dot";
          if (userAnswers[i] !== -1) cls += " answered";
          if (reviewFlags[i]) cls += " review";
          if (i === current) cls += " current";
          html += `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
        }
        document.getElementById("paletteGrid").innerHTML = html;
      }

      function finishQuiz() {
        if (!window._isReplay) {
          const unanswered = userAnswers.filter((a) => a === -1).length;
          if (unanswered > 0) {
            if (
              !confirm(
                `You have ${unanswered} unanswered question${unanswered > 1 ? "s" : ""}. Submit anyway?`
              )
            )
              return;
          }
        }
        submitQuiz();
      }

      function saveAttempt(data) {
        try {
          const results = JSON.parse(localStorage.getItem('papResults') || '[]');
          results.unshift(data);
          localStorage.setItem('papResults', JSON.stringify(results));
        } catch(e) {}
      }

        submitted = true;

        document.getElementById("palettePanel").style.display = "none";

          skipped = 0;
        let plantCorrect = 0,
          plantTotal = 25;
        let bloodCorrect = 0,
          bloodTotal = 25;

        for (let i = 0; i < TOTAL; i++) {
          if (userAnswers[i] === -1) {
            skipped++;
          } else if (userAnswers[i] === DATA[i].ans) {
            correct++;
            if (i < 25) plantCorrect++;
            else bloodCorrect++;
          } else {
            wrong++;
          }
        }

        const neetScore = correct * 4 - wrong * 1;
        const pct = Math.round((correct / TOTAL) * 100);
        const circumference = 2 * Math.PI * 65;
        const offset = circumference - (pct / 100) * circumference;
        const ringColor =
          pct >= 80
            ? "var(--green)"
            : pct >= 50
              ? "var(--amber)"
              : "var(--red)";
        const grade =
          pct >= 90
            ? "Outstanding!"
            : pct >= 75
              ? "Great Work!"
              : pct >= 50
                ? "Keep Practicing!"
                : "Needs Revision";

        const timeStr = document.getElementById("timerDisplay").textContent;
        const plantPct = Math.round((plantCorrect / plantTotal) * 100);
        const bloodPct = Math.round((bloodCorrect / bloodTotal) * 100);

        if (!window._isReplay) {
          saveAttempt({
            id: Date.now(),
            paperFile: 'PAP1.html',
            paperName: 'Plant Growth & Body Fluids',
            paperTag: 'Standard',
            correct, wrong, skipped,
            totalQuestions: TOTAL,
            neetScore,
            maxScore: TOTAL * 4,
            percentage: pct,
            timeTaken: timeStr,
            timerSeconds: timerSec,
            userAnswers: [...userAnswers]
          });
        }

        const res = document.getElementById("resultsSection");
        res.style.display = "block";

        let rhtml = `
<div class="results-card">
  <h2>${grade}</h2>
  <div class="score-ring">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle class="ring-bg" cx="80" cy="80" r="65"/>
      <circle class="ring-fill" cx="80" cy="80" r="65"
        stroke="${ringColor}"
        stroke-dasharray="${circumference}"
        stroke-dashoffset="${circumference}"
        id="scoreRing"/>
    </svg>
    <div class="score-center">
      <div class="pct">${pct}%</div>
      <div class="of">${correct}/${TOTAL}</div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-item neet"><div class="stat-num">${neetScore}</div><div class="stat-lbl">NEET Score</div></div>
    <div class="stat-item correct"><div class="stat-num">${correct}</div><div class="stat-lbl">Correct</div></div>
    <div class="stat-item wrong"><div class="stat-num">${wrong}</div><div class="stat-lbl">Wrong</div></div>
    <div class="stat-item skip"><div class="stat-num">${skipped}</div><div class="stat-lbl">Skipped</div></div>
  </div>
  <div style="margin-top:16px;font-size:13px;color:var(--text3)">Time: ${timeStr}</div>
</div>

<div class="chapter-breakdown">
  <h3>Chapter Breakdown</h3>
  <div class="chapter-bar-wrap">
    <div class="chapter-bar-header">
      <span style="color:var(--accent)">🌱 Plant Growth</span>
      <span style="color:var(--text2)">${plantCorrect}/${plantTotal} (${plantPct}%)</span>
    </div>
    <div class="chapter-bar-track">
      <div class="chapter-bar-fill" id="plantBar" style="width:0%;background:var(--accent)"></div>
    </div>
  </div>
  <div class="chapter-bar-wrap">
    <div class="chapter-bar-header">
      <span style="color:var(--pink)">🩸 Body Fluids</span>
      <span style="color:var(--text2)">${bloodCorrect}/${bloodTotal} (${bloodPct}%)</span>
    </div>
    <div class="chapter-bar-track">
      <div class="chapter-bar-fill" id="bloodBar" style="width:0%;background:var(--pink)"></div>
    </div>
  </div>
</div>

<div class="review-section">
  <div class="review-title">Complete Walkthrough</div>
  <div class="review-filter">
    <button class="filter-btn active" onclick="filterReview('all',this)">All (${TOTAL})</button>
    <button class="filter-btn" onclick="filterReview('wrong',this)">❌ Wrong (${wrong})</button>
    <button class="filter-btn" onclick="filterReview('skipped',this)">⏭️ Skipped (${skipped})</button>
    <button class="filter-btn" onclick="filterReview('correct',this)">✅ Correct (${correct})</button>
  </div>
  <div id="reviewCards"></div>
</div>`;

        res.innerHTML = rhtml;
        renderReviewCards("all");

        setTimeout(() => {
          document.getElementById("scoreRing").style.strokeDashoffset = offset;
          document.getElementById("plantBar").style.width = plantPct + "%";
          document.getElementById("bloodBar").style.width = bloodPct + "%";
        }, 100);

        res.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function renderReviewCards(filter) {
        const container = document.getElementById("reviewCards");
        let html = "";

        for (let i = 0; i < TOTAL; i++) {
          const d = DATA[i];
          const ua = userAnswers[i];
          const isCorrect = ua === d.ans;
          const isSkipped = ua === -1;
          const isWrong = !isCorrect && !isSkipped;

          if (filter === "wrong" && !isWrong) continue;
          if (filter === "skipped" && !isSkipped) continue;
          if (filter === "correct" && !isCorrect) continue;

          const ch = getChapter(i);
          const chLabel = getChapterLabel(i);

          let badgeClass, badgeText;
          if (isCorrect) {
            badgeClass = "rc-correct";
            badgeText = "✅ Correct";
          } else if (isSkipped) {
            badgeClass = "rc-skipped";
            badgeText = "⏭️ Skipped";
          } else {
            badgeClass = "rc-wrong";
            badgeText = "❌ Wrong";
          }

          html += `<div class="review-card">`;
          html += `<div class="rc-header">`;
          html += `<span class="q-num ${ch === "blood" ? "blood" : ""}">Q${i + 1}</span>`;
          html += `<span class="q-tag ${ch}">${chLabel}</span>`;
          html += `<span class="rc-badge ${badgeClass}">${badgeText}</span>`;
          html += `</div>`;
          html += `<div class="rc-q">${d.q}</div>`;
          html += `<div class="rc-opts">`;

          d.opts.forEach((o, j) => {
            let optClass = "rc-opt";
            if (j === d.ans) optClass += " rc-opt-correct";
            else if (j === ua && isWrong) optClass += " rc-opt-wrong";
            html += `<div class="${optClass}">`;
            html += `<span class="rc-letter">${LETTERS[j]}</span>`;
            html += `<span>${o}</span>`;
            html += `</div>`;
          });

          html += `</div>`;
          html += `<div class="rc-exp">${d.exp}</div>`;
          html += `</div>`;
        }

        if (!html)
          html = `<p style="text-align:center;color:var(--text3);padding:30px 0">No questions match this filter.</p>`;
        container.innerHTML = html;
      }

      function filterReview(type, btn) {
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderReviewCards(type);
      }

      window.addEventListener("scroll", () => {
        const pw = document.getElementById("progressWrap");
        if (window.scrollY > 200) {
          pw.classList.add("scrolled");
        } else {
          pw.classList.remove("scrolled");
        }
      });

      (function loadSavedAttempt() {
        const params = new URLSearchParams(window.location.search);
        const attemptId = params.get('attempt');
        if (!attemptId) return;
        const saved = JSON.parse(localStorage.getItem('papResults') || '[]');
        const attempt = saved.find(r => r.id === Number(attemptId));
        if (!attempt) return;
        window._isReplay = true;
        userAnswers = attempt.userAnswers;
        timerSec = attempt.timerSeconds || 0;
        const m = String(Math.floor(timerSec / 60)).padStart(2, "0");
        const s = String(timerSec % 60).padStart(2, "0");
        document.getElementById("timerDisplay").textContent = `${m}:${s}`;
        document.getElementById("hero").style.display = "none";
        submitQuiz();
      })();
    </script>
  </body>
</html>
