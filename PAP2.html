<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEET 2026 — Ultra Practice: Plant Growth & Body Fluids</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0e17;
        --surface: #111827;
        --surface2: #1a2236;
        --surface3: #222d44;
        --border: #2a3654;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
        --accent: #06d6a0;
        --accent2: #118ab2;
        --red: #ef4444;
        --green: #22c55e;
        --amber: #f59e0b;
        --purple: #a78bfa;
        --pink: #f472b6;
        --radius: 12px;
        --radius-sm: 8px;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "IBM Plex Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            ellipse at 20% 0%,
            rgba(6, 214, 160, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 100%,
            rgba(17, 138, 178, 0.06) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        z-index: 1;
      }

      /* ── HERO ── */
      .hero {
        text-align: center;
        padding: 50px 20px 40px;
        position: relative;
      }
      .hero-badge {
        display: inline-block;
        padding: 6px 18px;
        border-radius: 50px;
        background: rgba(6, 214, 160, 0.12);
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 18px;
        border: 1px solid rgba(6, 214, 160, 0.2);
      }
      .hero h1 {
        font-family: "DM Serif Display", serif;
        font-size: clamp(28px, 5vw, 44px);
        color: #fff;
        margin-bottom: 12px;
        line-height: 1.2;
      }
      .hero h1 span {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero p {
        color: var(--text2);
        font-size: 16px;
        max-width: 560px;
        margin: 0 auto 24px;
      }
      .hero-tags {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .hero-tags span {
        padding: 5px 14px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
      }
      .tag-plant {
        background: rgba(34, 197, 94, 0.1);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
      .tag-blood {
        background: rgba(244, 114, 182, 0.1);
        color: var(--pink);
        border: 1px solid rgba(244, 114, 182, 0.2);
      }
      .start-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 28px;
        padding: 16px 48px;
        font-size: 17px;
        font-weight: 700;
        color: var(--bg);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 25px rgba(6, 214, 160, 0.3);
      }
      .start-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 35px rgba(6, 214, 160, 0.4);
      }

      /* ── PROGRESS BAR ── */
      .progress-wrap {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10, 14, 23, 0.92);
        backdrop-filter: blur(12px);
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: none;
        transition: box-shadow 0.3s;
      }
      .progress-wrap.active {
        display: block;
      }
      .progress-wrap.scrolled {
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      }
      .progress-inner {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .progress-text {
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
        white-space: nowrap;
        min-width: 90px;
      }
      .progress-text b {
        color: var(--accent);
      }
      .progress-bar {
        flex: 1;
        height: 6px;
        background: var(--surface3);
        border-radius: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 10px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        width: 0%;
      }
      .progress-timer {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--text3);
        min-width: 60px;
        text-align: right;
      }

      /* ── QUESTION CARD ── */
      .q-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        margin-bottom: 24px;
        display: none;
        animation: fadeIn 0.35s ease;
      }
      .q-card.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .q-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .q-tag {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 50px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .q-tag.plant {
        background: rgba(34, 197, 94, 0.12);
        color: var(--green);
      }
      .q-tag.blood {
        background: rgba(244, 114, 182, 0.12);
        color: var(--pink);
      }
      .q-tag.type {
        background: rgba(167, 139, 250, 0.12);
        color: var(--purple);
      }
      .q-header {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 18px;
      }
      .q-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--bg);
        background: var(--accent);
        padding: 4px 10px;
        border-radius: 6px;
        white-space: nowrap;
        margin-top: 2px;
        flex-shrink: 0;
      }
      .q-num.blood-num {
        background: var(--pink);
      }
      .q-text {
        font-size: 15.5px;
        color: #fff;
        line-height: 1.7;
        margin-bottom: 20px;
      }
      .q-text strong {
        color: var(--accent);
        font-weight: 600;
      }
      .q-text em {
        color: var(--accent);
        font-style: normal;
        font-weight: 600;
      }
      .q-text table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 14px;
      }
      .q-text table th,
      .q-text table td {
        padding: 8px 12px;
        border: 1px solid var(--border);
        text-align: left;
      }
      .q-text table th {
        background: var(--surface2);
        color: var(--accent);
        font-weight: 600;
      }

      /* ── OPTIONS ── */
      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .opt-btn {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 18px;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        width: 100%;
        font-size: 14.5px;
        color: var(--text);
        line-height: 1.5;
      }
      .opt-btn:hover:not(.disabled) {
        border-color: var(--accent);
        background: rgba(6, 214, 160, 0.05);
      }
      .opt-btn .opt-letter {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        color: var(--text3);
        font-size: 13px;
        min-width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: var(--surface3);
        flex-shrink: 0;
        margin-top: 1px;
      }
      .opt-btn.selected {
        border-color: var(--accent);
        background: rgba(6, 214, 160, 0.08);
      }
      .opt-btn.selected .opt-letter {
        background: var(--accent);
        color: var(--bg);
      }

      /* ── NAVIGATION ── */
      .nav-btns {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        flex-wrap: wrap;
      }
      .nav-btn {
        padding: 10px 24px;
        border-radius: var(--radius-sm);
        font-family: "IBM Plex Sans", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text);
      }
      .nav-btn:hover {
        border-color: var(--accent);
      }
      .nav-btn.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        color: var(--bg);
        font-weight: 700;
        box-shadow: 0 2px 12px rgba(6, 214, 160, 0.2);
      }
      .nav-btn.primary:hover {
        box-shadow: 0 4px 20px rgba(6, 214, 160, 0.3);
      }
      .nav-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .mark-review {
        margin-left: auto;
        font-size: 13px;
        color: var(--amber);
        background: rgba(245, 158, 11, 0.08);
        border-color: rgba(245, 158, 11, 0.25);
      }
      .mark-review.marked {
        background: rgba(245, 158, 11, 0.2);
        border-color: var(--amber);
      }
      .clear-response {
        font-size: 13px;
        color: var(--red);
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.25);
      }
      .clear-response:hover {
        background: rgba(239, 68, 68, 0.15);
        border-color: var(--red);
      }

      /* ── PALETTE ── */
      .palette-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: var(--bg);
        border: none;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        z-index: 200;
        box-shadow: 0 4px 20px rgba(6, 214, 160, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
      }
      .palette-toggle.active {
        display: flex;
      }
      .palette-panel {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 300px;
        max-height: 400px;
        overflow-y: auto;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        z-index: 200;
        display: none;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .palette-panel.open {
        display: block;
      }
      .palette-title {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 14px;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .palette-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 6px;
      }
      .palette-dot {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text3);
        transition: all 0.15s;
      }
      .palette-dot:hover {
        border-color: var(--accent);
      }
      .palette-dot.answered {
        background: rgba(6, 214, 160, 0.15);
        border-color: var(--accent);
        color: var(--accent);
      }
      .palette-dot.review {
        background: rgba(245, 158, 11, 0.15);
        border-color: var(--amber);
        color: var(--amber);
      }
      .palette-dot.current {
        box-shadow: 0 0 0 2px var(--accent);
      }
      .palette-legend {
        display: flex;
        gap: 16px;
        margin-top: 14px;
        font-size: 11px;
        color: var(--text3);
      }
      .palette-legend span {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
      }

      /* ── RESULTS ── */
      #results-section {
        display: none;
      }
      .results-hero {
        text-align: center;
        padding: 48px 0 40px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 40px;
      }
      .score-ring {
        width: 180px;
        height: 180px;
        margin: 0 auto 24px;
        position: relative;
      }
      .score-ring svg {
        transform: rotate(-90deg);
      }
      .score-ring .ring-bg {
        fill: none;
        stroke: var(--surface3);
        stroke-width: 10;
      }
      .score-ring .ring-fill {
        fill: none;
        stroke-width: 10;
        stroke-linecap: round;
        transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .score-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .score-pct {
        font-family: "JetBrains Mono", monospace;
        font-size: 38px;
        font-weight: 700;
        color: #fff;
      }
      .score-sub {
        font-size: 13px;
        color: var(--text3);
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 36px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 18px 16px;
        text-align: center;
      }
      .stat-val {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .stat-val.green {
        color: var(--green);
      }
      .stat-val.red {
        color: var(--red);
      }
      .stat-val.yellow {
        color: var(--amber);
      }
      .stat-val.blue {
        color: var(--accent);
      }
      .stat-label {
        font-size: 12px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .chapter-breakdown {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 40px;
      }
      .chapter-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px;
      }
      .chapter-card h3 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ch-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .ch-dot.plant {
        background: var(--green);
      }
      .ch-dot.blood {
        background: var(--pink);
      }
      .chapter-bar-wrap {
        height: 8px;
        background: var(--surface3);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .chapter-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 1s ease;
      }
      .chapter-bar-fill.plant {
        background: var(--green);
      }
      .chapter-bar-fill.blood {
        background: var(--pink);
      }
      .chapter-score {
        font-size: 13px;
        color: var(--text2);
      }

      /* ── FILTER TABS ── */
      .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .filter-tab {
        padding: 8px 20px;
        border-radius: 50px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filter-tab:hover,
      .filter-tab.active {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }

      /* ── REVIEW CARDS ── */
      .review-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        margin-bottom: 20px;
      }
      .review-card.status-correct {
        border-left: 4px solid var(--green);
      }
      .review-card.status-wrong {
        border-left: 4px solid var(--red);
      }
      .review-card.status-skipped {
        border-left: 4px solid var(--amber);
      }
      .review-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .review-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 5px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }
      .review-badge.correct {
        background: rgba(34, 197, 94, 0.1);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .review-badge.wrong {
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .review-badge.skipped {
        background: rgba(245, 158, 11, 0.1);
        color: var(--amber);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .review-q-text {
        font-size: 14.5px;
        line-height: 1.75;
        margin-bottom: 16px;
        color: var(--text);
      }
      .review-q-text strong {
        color: var(--accent);
      }
      .review-options {
        margin-bottom: 18px;
      }
      .review-opt {
        padding: 10px 14px;
        margin-bottom: 6px;
        border-radius: var(--radius-sm);
        font-size: 13.5px;
        line-height: 1.6;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border: 1.5px solid transparent;
      }
      .review-opt.is-correct {
        background: rgba(34, 197, 94, 0.08);
        border-color: rgba(34, 197, 94, 0.3);
      }
      .review-opt.is-wrong {
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.3);
      }
      .review-opt .opt-marker {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
      }
      .review-opt.is-correct .opt-marker {
        background: var(--green);
        color: #fff;
      }
      .review-opt.is-wrong .opt-marker {
        background: var(--red);
        color: #fff;
      }
      .review-opt:not(.is-correct):not(.is-wrong) .opt-marker {
        background: var(--surface3);
        color: var(--text3);
      }
      .explanation-box {
        background: rgba(6, 214, 160, 0.05);
        border: 1px solid rgba(6, 214, 160, 0.15);
        border-radius: var(--radius-sm);
        padding: 18px 20px;
      }
      .explanation-box h4 {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--accent);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .explanation-box p {
        font-size: 13.5px;
        line-height: 1.75;
        color: var(--text2);
      }
      .explanation-box p strong {
        color: var(--text);
      }
      .explanation-box .ncert-ref {
        display: inline-block;
        margin-top: 8px;
        font-size: 11px;
        padding: 3px 8px;
        background: rgba(6, 214, 160, 0.1);
        border-radius: 4px;
        color: var(--accent);
        font-weight: 600;
      }

      .back-to-top {
        display: flex;
        justify-content: center;
        margin: 40px 0;
      }

      @media (max-width: 600px) {
        .container {
          padding: 12px;
        }
        .q-card {
          padding: 20px 16px;
        }
        .review-card {
          padding: 20px 16px;
        }
        .hero h1 {
          font-size: 26px;
        }
        .stats-row {
          grid-template-columns: 1fr 1fr;
        }
        .chapter-breakdown {
          grid-template-columns: 1fr;
        }
        .progress-inner {
          gap: 10px;
        }
        .palette-panel {
          width: calc(100vw - 40px);
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══ HERO ═══ -->

      // ══════════════════════════════════════════
      // QUIZ ENGINE
      // ══════════════════════════════════════════
      let currentQ = 0;
      let answers = new Array(questions.length).fill(-1);
      let markedForReview = new Array(questions.length).fill(false);
      let timerInterval = null;
      let seconds = 0;
      let quizStarted = false;

      function startQuiz() {
        document.getElementById("hero-section").style.display = "none";
        document.getElementById("progress-wrap").classList.add("active");
        document.getElementById("palette-toggle").classList.add("active");
        quizStarted = true;
        buildAllCards();
        buildPalette();
        showQuestion(0);
        startTimer();
      }

      function buildAllCards() {
        const area = document.getElementById("quiz-area");
        const letters = ["A", "B", "C", "D"];
        let html = "";
        questions.forEach((q, i) => {
          const chClass = q.chapter === "plant" ? "plant" : "blood";
          const chLabel =
            q.chapter === "plant" ? "🌱 Plant Growth" : "🩸 Body Fluids";
          const numClass = q.chapter === "blood" ? "blood-num" : "";
          html += `<div class="q-card" id="qcard-${i}">
      <div class="q-meta">
        <span class="q-tag ${chClass}">${chLabel}</span>
        <span class="q-tag type">${q.type}</span>
      </div>
      <div class="q-header">
        <span class="q-num ${numClass}">Q${i + 1}</span>
        <div class="q-text">${q.text}</div>
      </div>
      <div class="options">
        ${q.options
          .map(
            (opt, oi) => `
          <button class="opt-btn" id="opt-${i}-${oi}" onclick="selectOption(${i},${oi})">
            <span class="opt-letter">${letters[oi]}</span>
            <span>${opt}</span>
          </button>
        `,
          )
          .join("")}
      </div>
      <div class="nav-btns">
        <button class="nav-btn" onclick="prevQuestion()" ${i === 0 ? "disabled" : ""}>← Prev</button>
        <button class="nav-btn primary" onclick="nextQuestion()">
          ${i === questions.length - 1 ? "Finish →" : "Next →"}
        </button>
        <button class="nav-btn clear-response" onclick="clearResponse(${i})">✕ Clear</button>
        <button class="nav-btn mark-review" id="mark-${i}" onclick="toggleReview(${i})">⚑ Mark for Review</button>
      </div>
    </div>`;
        });
        area.innerHTML = html;
      }

      function showQuestion(idx) {
        document
          .querySelectorAll(".q-card")
          .forEach((c) => c.classList.remove("active"));
        document.getElementById(`qcard-${idx}`).classList.add("active");
        currentQ = idx;
        updateProgress();
        updatePalette();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function selectOption(qIdx, optIdx) {
        for (let i = 0; i < 4; i++) {
          const el = document.getElementById(`opt-${qIdx}-${i}`);
          if (el) el.classList.remove("selected");
        }
        document
          .getElementById(`opt-${qIdx}-${optIdx}`)
          .classList.add("selected");
        answers[qIdx] = optIdx;
        updateProgress();
        updatePalette();
      }

      function clearResponse(qIdx) {
        answers[qIdx] = -1;
        for (let i = 0; i < 4; i++) {
          const el = document.getElementById(`opt-${qIdx}-${i}`);
          if (el) el.classList.remove("selected");
        }
        updateProgress();
        updatePalette();
      }

      function nextQuestion() {
        if (currentQ < questions.length - 1) {
          showQuestion(currentQ + 1);
        } else {
          submitQuiz();
        }
      }

      function prevQuestion() {
        if (currentQ > 0) showQuestion(currentQ - 1);
      }

      function toggleReview(idx) {
        markedForReview[idx] = !markedForReview[idx];
        const btn = document.getElementById(`mark-${idx}`);
        btn.classList.toggle("marked", markedForReview[idx]);
        btn.textContent = markedForReview[idx]
          ? "⚑ Marked"
          : "⚑ Mark for Review";
        updatePalette();
      }

      function updateProgress() {
        const answered = answers.filter((a) => a !== -1).length;
        document.getElementById("q-counter").textContent = `Q ${currentQ + 1}`;
        document.getElementById("progress-fill").style.width =
          `${(answered / questions.length) * 100}%`;
      }

      function buildPalette() {
        const grid = document.getElementById("palette-grid");
        let html = "";
        for (let i = 0; i < questions.length; i++) {
          html += `<div class="palette-dot" id="pdot-${i}" onclick="showQuestion(${i})">${i + 1}</div>`;
        }
        grid.innerHTML = html;
      }

      function updatePalette() {
        for (let i = 0; i < questions.length; i++) {
          const dot = document.getElementById(`pdot-${i}`);
          if (!dot) continue;
          dot.className = "palette-dot";
          if (i === currentQ) dot.classList.add("current");
          if (answers[i] !== -1) dot.classList.add("answered");
          if (markedForReview[i]) dot.classList.add("review");
        }
      }

      function togglePalette() {
        document.getElementById("palette-panel").classList.toggle("open");
      }

      function startTimer() {
        timerInterval = setInterval(() => {
          seconds++;
          const m = Math.floor(seconds / 60)
            .toString()
            .padStart(2, "0");
          const s = (seconds % 60).toString().padStart(2, "0");
          document.getElementById("timer").textContent = `${m}:${s}`;
        }, 1000);
      }

      // ══════════════════════════════════════════
      // SUBMIT & RESULTS
      // ══════════════════════════════════════════
      function saveAttempt(data) {
        try {
          const results = JSON.parse(
            localStorage.getItem("papResults") || "[]",
          );
          results.unshift(data);
          localStorage.setItem("papResults", JSON.stringify(results));
        } catch (e) {}
      }

      function submitQuiz() {
        const unanswered = answers.filter((a) => a === -1).length;
        if (!window._isReplay && unanswered > 0) {
          if (
            !confirm(
              `You have ${unanswered} unanswered question(s). Submit anyway?`,
            )
          )
            return;
        }

        clearInterval(timerInterval);
        document.getElementById("quiz-area").innerHTML = "";
        document.getElementById("progress-wrap").classList.remove("active");
        document.getElementById("palette-toggle").classList.remove("active");
        document.getElementById("palette-panel").classList.remove("open");

        let correct = 0,
          wrong = 0,
          skipped = 0;
        let plantCorrect = 0,
          plantTotal = 0,
          bloodCorrect = 0,
          bloodTotal = 0;
        const results = [];

        questions.forEach((q, i) => {
          const userAns = answers[i];
          let status;
          if (userAns === -1) {
            status = "skipped";
            skipped++;
          } else if (userAns === q.answer) {
            status = "correct";
            correct++;
          } else {
            status = "wrong";
            wrong++;
          }

          if (q.chapter === "plant") {
            plantTotal++;
            if (status === "correct") plantCorrect++;
          } else {
            bloodTotal++;
            if (status === "correct") bloodCorrect++;
          }
          results.push({ ...q, userAns, status, idx: i });
        });

        const neetScore = correct * 4 - wrong * 1;
        const maxScore = questions.length * 4;
        const percentage = Math.round((correct / questions.length) * 100);
        const timeTaken = `${Math.floor(seconds / 60)}m ${seconds % 60}s`;

        if (!window._isReplay) {
          saveAttempt({
            id: Date.now(),
            paperFile: "PAP2.html",
            paperName: "Plant Growth & Body Fluids",
            paperTag: "Ultra",
            correct,
            wrong,
            skipped,
            totalQuestions: questions.length,
            neetScore,
            maxScore,
            percentage,
            timeTaken,
            timerSeconds: seconds,
            userAnswers: [...answers],
          });
        }

        renderResults(
          results,
          correct,
          wrong,
          skipped,
          neetScore,
          maxScore,
          percentage,
          timeTaken,
          plantCorrect,
          plantTotal,
          bloodCorrect,
          bloodTotal,
        );
      }

      function renderResults(
        results,
        correct,
        wrong,
        skipped,
        neetScore,
        maxScore,
        percentage,
        timeTaken,
        pc,
        pt,
        bc,
        bt,
      ) {
        const section = document.getElementById("results-section");
        section.style.display = "block";

        const circumference = 2 * Math.PI * 80;
        const offset = circumference - (percentage / 100) * circumference;
        let ringColor =
          percentage >= 80
            ? "var(--green)"
            : percentage >= 50
              ? "var(--amber)"
              : "var(--red)";

        let gradeEmoji = "🔥",
          gradeText = "Outstanding!";
        if (percentage < 40) {
          gradeEmoji = "📚";
          gradeText = "Keep Studying!";
        } else if (percentage < 60) {
          gradeEmoji = "💪";
          gradeText = "Good Effort!";
        } else if (percentage < 80) {
          gradeEmoji = "⭐";
          gradeText = "Well Done!";
        }

        const letters = ["A", "B", "C", "D"];

        let html = `
    <div class="results-hero">
      <div style="font-size:48px;margin-bottom:12px">${gradeEmoji}</div>
      <h2 style="font-family:'DM Serif Display',serif;font-size:32px;color:#fff;margin-bottom:6px">${gradeText}</h2>
      <p style="color:var(--text2);font-size:14px;margin-bottom:28px">Time taken: ${timeTaken}</p>
      <div class="score-ring">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="80"/>
          <circle class="ring-fill" id="score-ring-fill" cx="90" cy="90" r="80"
            stroke="${ringColor}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"/>
        </svg>
        <div class="score-center">
          <div class="score-pct">${percentage}%</div>
          <div class="score-sub">${correct}/${questions.length}</div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val blue">${neetScore}/${maxScore}</div>
        <div class="stat-label">NEET Score (+4/−1)</div>
      </div>
      <div class="stat-card">
        <div class="stat-val green">${correct}</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-card">
        <div class="stat-val red">${wrong}</div>
        <div class="stat-label">Wrong</div>
      </div>
      <div class="stat-card">
        <div class="stat-val yellow">${skipped}</div>
        <div class="stat-label">Skipped</div>
      </div>
    </div>

    <div class="chapter-breakdown">
      <div class="chapter-card">
        <h3><span class="ch-dot plant"></span> Plant Growth & Dev.</h3>
        <div class="chapter-bar-wrap">
          <div class="chapter-bar-fill plant" id="plant-bar" style="width:0%"></div>
        </div>
        <div class="chapter-score">${pc} / ${pt} correct (${Math.round((pc / pt) * 100)}%)</div>
      </div>
      <div class="chapter-card">
        <h3><span class="ch-dot blood"></span> Body Fluids & Circulation</h3>
        <div class="chapter-bar-wrap">
          <div class="chapter-bar-fill blood" id="blood-bar" style="width:0%"></div>
        </div>
        <div class="chapter-score">${bc} / ${bt} correct (${Math.round((bc / bt) * 100)}%)</div>
      </div>
    </div>

    <h2 style="font-family:'DM Serif Display',serif;font-size:28px;color:#fff;margin-bottom:8px;text-align:center">Complete Walkthrough</h2>
    <p style="color:var(--text2);font-size:14px;margin-bottom:24px;text-align:center">Every question reviewed with NCERT-based explanations.</p>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterReview('all',this)">All (${questions.length})</button>
      <button class="filter-tab" onclick="filterReview('wrong',this)">❌ Wrong (${wrong})</button>
      <button class="filter-tab" onclick="filterReview('skipped',this)">⏭ Skipped (${skipped})</button>
      <button class="filter-tab" onclick="filterReview('correct',this)">✅ Correct (${correct})</button>
    </div>

    <div id="review-cards">`;

        results.forEach((r) => {
          const chClass = r.chapter === "plant" ? "plant" : "blood";
          const chLabel = r.chapter === "plant" ? "🌱 Plant" : "🩸 Blood";
          const numClass = r.chapter === "blood" ? "blood-num" : "";
          html += `
      <div class="review-card status-${r.status}" data-status="${r.status}">
        <div class="review-header">
          <span class="q-num ${numClass}">Q${r.idx + 1}</span>
          <span class="q-tag ${chClass}">${chLabel}</span>
          <span class="review-badge ${r.status}">${r.status === "correct" ? "✓ Correct" : r.status === "wrong" ? "✗ Wrong" : "— Skipped"}</span>
          <span class="q-tag type">${r.type}</span>
        </div>
        <div class="review-q-text">${r.text}</div>
        <div class="review-options">
          ${r.options
            .map((opt, oi) => {
              let cls = "";
              if (oi === r.answer) cls = "is-correct";
              else if (oi === r.userAns && r.userAns !== r.answer)
                cls = "is-wrong";
              let marker = letters[oi];
              if (oi === r.answer) marker = "✓";
              else if (oi === r.userAns && r.userAns !== r.answer) marker = "✗";
              return `<div class="review-opt ${cls}">
              <span class="opt-marker">${marker}</span>
              <span>${opt}</span>
            </div>`;
            })
            .join("")}
        </div>
        <div class="explanation-box">
          <h4>💡 Explanation</h4>
          <p>${r.explanation}</p>
          <span class="ncert-ref">📖 NCERT ${r.chapter === "plant" ? "Class 11 — Plant Growth & Dev." : "Class 11 — Body Fluids & Circulation"}</span>
        </div>
      </div>`;
        });

        html += `</div>
    <div class="back-to-top">
      <button class="nav-btn primary" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Back to Top</button>
    </div>`;

        section.innerHTML = html;

        setTimeout(() => {
          document.getElementById("score-ring-fill").style.strokeDashoffset =
            offset;
          document.getElementById("plant-bar").style.width =
            `${Math.round((pc / pt) * 100)}%`;
          document.getElementById("blood-bar").style.width =
            `${Math.round((bc / bt) * 100)}%`;
        }, 100);

        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function filterReview(status, btn) {
        document
          .querySelectorAll(".filter-tab")
          .forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".review-card").forEach((card) => {
          if (status === "all") card.style.display = "block";
          else
            card.style.display =
              card.dataset.status === status ? "block" : "none";
        });
      }

      // Scroll effects
      window.addEventListener("scroll", () => {
        const pw = document.getElementById("progress-wrap");
        if (window.scrollY > 100) pw.classList.add("scrolled");
        else pw.classList.remove("scrolled");
      });

      (function loadSavedAttempt() {
        const params = new URLSearchParams(window.location.search);
        const attemptId = params.get("attempt");
        if (!attemptId) return;
        const saved = JSON.parse(localStorage.getItem("papResults") || "[]");
        const attempt = saved.find((r) => r.id === Number(attemptId));
        if (!attempt) return;
        window._isReplay = true;
        answers = attempt.userAnswers;
        seconds = attempt.timerSeconds || 0;
        document.getElementById("hero-section").style.display = "none";
        submitQuiz();
      })();
    </script>
  </body>
</html>
